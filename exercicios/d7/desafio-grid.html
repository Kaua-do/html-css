<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Grid Layout</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template: 80px 40px 1fr 40px / 1fr 150px;
            gap: 5px;

        }

        .caixa {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        #topo {
            background-color: rgba(0, 0, 255, 0.596);
            grid-area: 1 / 1 / 1 / 3;
        }

        #menu {
            background-color: blueviolet;
            grid-area: 2 / 1 / 3 / 3;
        }

        #principal {
            background-color: green;
            grid-area: 3 / 1 / 4 / 2;
        }

        #secundario {
            background-color: greenyellow;
            grid-area: 3 / 2 / 4 / 3;
        }

        #rodape {
            background-color: brown;
            grid-area: 4 / 1 / 5 / 3;
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="caixa" id="topo">Topo</header>
        <nav class="caixa" id="menu">Menu</nav>
        <main class="caixa" id="principal">Principal</main>
        <aside class="caixa" id="secundario">Secundario</aside>
        <footer class="caixa" id="rodape">Rodapé</footer>
    </div>
</body>
</html>
