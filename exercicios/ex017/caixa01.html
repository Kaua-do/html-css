<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Tags</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(58, 116, 97) 
        }

        header {
            background-color: white;
            padding: 10px;
            margin: 10px;
            box-shadow: 2px 2px 4px 1px rgba(0, 0, 0, 0.345);
        }
        
        main {
            background-color: white;
            padding: 10px;
            margin: 10px;
            border-radius: 0px 8px 0px 8px;
            box-shadow: 2px 2px 4px 1px rgba(0, 0, 0, 0.345);
        }

        nav {
            background-color: rgb(3, 209, 209);
            padding: 3px;
            box-shadow: 2px 2px 4px 1px rgba(0, 0, 0, 0.345);
        }

        nav > a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-right: 30px;
        }

        nav > a:hover {
            text-decoration: underline;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>Menu</h1>
        <nav>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
        </nav>
    </header>
    <main>
        <section>
            <article>
                <h1>Animes mais populares de 2026</h1>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Mollitia laborum sequi fuga tenetur ipsum, repellendus quas voluptatum obcaecati quia quod debitis dolor, harum ipsa hic est consectetur iste, consequuntur provident?</p>
            </article>
            
        </section>
    </main>
</body>
</html>
