<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div id="imagem"></div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="#" method="post">
                    <div class="campo">
                        <label for="inome"><span class="material-symbols-outlined">person</span></label>
                    <input type="text" name="nome" id="inome" required placeholder="seu e-mail"><br>
                    </div>
                    
                    <div class="campo">
                        <label for="isenha"><span class="material-symbols-outlined">vpn_key</span></label>
                        <input type="text" name="senha" id="isenha" required placeholder="sua senha"><br>
                    </div>
                    <input type="submit" value="Entrar"><br>
                    <input type="button" value="Esqueci a senha"
                </form>
            </div>
        </section>
    </main>
</body>

</html>
